<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background-color: #000000 !important; border-bottom: 1px solid #333; }
        .nav-link { color: #ffffff !important; font-weight: 500; }
        .nav-link:hover { color: #0d6efd !important; }
        .cat-btn { padding: 40px !important; font-size: 1.5rem; transition: transform 0.3s ease; border-width: 2px; }
        .cat-btn:hover { transform: scale(1.05); background-color: #0d6efd; color: white; }
    </style>
    <title>განათლების პორტალი</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="https://www.tbcbank.ge/" target="_blank">
                <img src="https://media.licdn.com/dms/image/v2/D4D0BAQGeMTNsSN-_AA/company-logo_200_200/B4DZVq.5LLGkAI-/0/1741256627348/tbc_bank_logo?e=2147483647&v=beta&t=hDV4sBHzVEgIf63_U6Le4U3npwtpp7MJnZRwHeT-87Q" width="50" alt="TBC">
            </a>

            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link" href="{{ url_for('index') }}">მთავარი</a>

                <!-- თუ მომხმარებელი სისტემაშია -->
                {% if current_user.is_authenticated %}
                    <a class="nav-link ms-3" href="{{ url_for('add_news') }}">სიახლის დამატება</a>
                    <a class="nav-link ms-3 text-danger" href="{{ url_for('logout') }}">გასვლა ({{ current_user.first_name }})</a>
                <!-- თუ არ არის სისტემაში -->
                {% else %}
                    <a class="nav-link ms-3" href="{{ url_for('login') }}">შესვლა</a>
                    <a class="nav-link ms-3 btn btn-outline-primary px-3 rounded-pill" href="{{ url_for('register') }}">რეგისტრაცია</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
