<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #212122; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background-color: #000000; border-bottom: 1px solid #333; }
        .nav-link { color: #ffffff !important; font-weight: 500; }
        .nav-link:hover { color: #8dd0ff !important; }
        .cat-btn { padding: 40px; font-size: 1.3rem; transition: transform 0.3s ease; border-width: 2px; }
        .cat-btn:hover { transform: scale(1.05); background-color: #8dd0ff; color: white; }
        @media (max-width: 768px) {
    .container {
        max-width: 100% !important;
        margin: 0 !important;
        padding: 0 10px !important;
    }
    .cat-btn {
        padding: 15px !important;
        font-size: 1rem !important;
    }
}
    </style>
    <title>სიახლეების საიტი</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="https://www.tbcbank.ge/" target="_blank">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTX-97o0SxX3it7DPtpBVlGnK0nkH4I5sL59rn0WWYsUg&s=10" width="50" alt="TBC">
            </a>

            <div class="navbar-nav ms-auto align-items-center">
    <!-- ეს არის საძიებო ფორმა -->
    <form action="{{ url_for('search_news') }}" method="GET" class="d-flex me-3">
        <input class="form-control me-2" type="search" name="q" placeholder="ძებნა...">
        <button class="btn btn-outline-light" type="submit">ძებნა</button>
    </form>

    <a class="nav-link" href="{{ url_for('index') }}">მთავარი</a>

    {% if current_user.is_authenticated %}
        <a class="nav-link" href="{{ url_for('add_news') }}">სიახლის დამატება</a>
        <a class="nav-link" href="{{ url_for('saved_news') }}">შენახული სიახლეები</a>
        <a class="nav-link text-danger" href="{{ url_for('logout') }}">{{ current_user.username }} (გასვლა)</a>
    {% else %}
        <a class="nav-link ms-3 btn btn-outline-primary px-3 rounded-pill" href="{{ url_for('login') }}">შესვლა</a>
        <a class="nav-link ms-3 btn btn-outline-primary px-3 rounded-pill" href="{{ url_for('register') }}">რეგისტრაცია</a>
    {% endif %}
</div>
        </div>
    </nav>

    <div class="container flex-grow-1">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
