{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 card p-4 shadow" style="background-color: #1e1e1e; border: 1px solid #333;">
        <h3 class="text-white mb-4 text-center">სისტემაში შესვლა</h3>
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="mb-3">
                <label class="text-white">ელ.ფოსტა</label>
                {{ form.email(class="form-control bg-dark text-white") }}
            </div>
            <div class="mb-3">
                <label class="text-white">პაროლი</label>
                {{ form.password(class="form-control bg-dark text-white") }}
            </div>
            {{ form.submit(class="btn btn-success w-100") }}
        </form>
    </div>
</div>
{% endblock %}
